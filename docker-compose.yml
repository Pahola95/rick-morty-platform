version: '3.8'

services:

  # ─── Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rickmorty_backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rickmorty_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://rabbitmq
      AUTH0_AUDIENCE: https://rickmorty-api/
      AUTH0_ISSUER_BASE_URL: https://dev-sqefy6r87osts5th.us.auth0.com
      AUTH0_CLIENT_ID: pO4siVKY1QRnFOZ11xxPXGytAQbbV1hu
      SWAGGER_ENABLED: true  
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - rickmorty_network
    restart: unless-stopped

  # ─── Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rickmorty_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - rickmorty_network
    restart: unless-stopped

  # ─── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: rickmorty_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rickmorty_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rickmorty_network
    restart: unless-stopped

  # ─── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rickmorty_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rickmorty_network
    restart: unless-stopped

  # ─── RabbitMQ ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rickmorty_rabbitmq
    ports:
      - "5672:5672"    # Conexión de la app
      - "15672:15672"  # Panel de administración
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rickmorty_network
    restart: unless-stopped

# ─── Volúmenes ───────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

# ─── Red ─────────────────────────────────────────────────
networks:
  rickmorty_network:
    driver: bridge