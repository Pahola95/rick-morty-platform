<div class="container-fluid p-4">
  <h2 class="text-info mb-4">📺 Episodios</h2>

  <!-- Filtros -->
  <div class="filter-bar mb-3">
    <input class="form-control" placeholder="Buscar por nombre..."
      [(ngModel)]="filters.name" (keyup.enter)="applyFilters()">
    <input class="form-control" placeholder="Código (S01E01...)"
      [(ngModel)]="filters.episode" (keyup.enter)="applyFilters()">
    <button class="btn btn-info" (click)="applyFilters()">🔍 Buscar</button>
  </div>

  <!-- Ordenamiento + Export -->
  <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
    <app-sort-bar [fields]="sortFields" (sortChange)="onSortChange($event)"></app-sort-bar>
    <app-export-button
      [data]="exportData()"
      filename="episodios"
      title="Episodios - Rick & Morty">
    </app-export-button>
  </div>

  <app-spinner *ngIf="loading()"></app-spinner>

  <div class="row g-3" *ngIf="!loading()">
    <div class="col-md-3 col-sm-6" *ngFor="let episode of sortedEpisodes()">
      <app-card
        [id]="episode.id"
        [name]="episode.name"
        [subtitle]="episode.air_date"
        [badge]="episode.episode"
        [type]="'EPISODE'"
        [isFavorite]="isFavorite(episode)"
        (cardClick)="goToDetail(episode.id)"
        (favoriteToggle)="toggleFavorite(episode)">
      </app-card>
    </div>

    <div class="col-12 text-center text-muted py-5" *ngIf="sortedEpisodes().length === 0">
      No se encontraron episodios con esos filtros.
    </div>
  </div>

  <div class="mt-4">
    <app-pagination [currentPage]="currentPage" [totalPages]="totalPages"
      (pageChange)="onPageChange($event)">
    </app-pagination>
  </div>
</div>
